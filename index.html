<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Fairway Finder</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <header>
    <h1>🏌️ Fairway Finder</h1>
  </header>

  <main>
    <div id="locationEntry">
      <input type="text" id="locationInput" placeholder="Enter city or address">
      <button onclick="setLocation()">Set Location</button>
    </div>

    <div id="filters">
      <label>Distance (km): <span id="distanceValue">50</span></label>
      <input type="range" id="distanceSlider" min="1" max="200" value="50">
      
      <label>Sort by:
        <select id="sortSelect">
          <option value="distance">Distance</option>
          <option value="rating">Rating</option>
        </select>
      </label>
    </div>

    <div id="courses">
      <p>Enter a city or address to see nearby courses.</p>
    </div>
  </main>

  <footer>
    <p>© Fairway Finder</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
