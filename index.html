<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Fairway Finder</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="styles.css">
<meta name="theme-color" content="#0f172a">
</head>
<body>
<div class="app">
  <header>
    <h1>🏌️ Fairway Finder</h1>
    <p>Find & Book Tee Times Near You</p>
  </header>
  <div class="controls">
    <button class="primary-btn" onclick="getLocation()">Find Nearby Courses</button>
    <div class="filter-row">
      <label>Distance: <span id="distanceLabel">25</span> mi</label>
      <input type="range" min="5" max="50" value="25" id="distanceRange" oninput="updateDistanceLabel(this.value)">
    </div>
    <select id="sortSelect" onchange="applyFilters()">
      <option value="distance">Sort by Distance</option>
      <option value="rating">Sort by Rating</option>
    </select>
  </div>
  <div id="results"></div>
  <h2>Favorites</h2>
  <div id="favorites"></div>
</div>
<script src="app.js"></script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js');
}
</script>
</body>
</html>
